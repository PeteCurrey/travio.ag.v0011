<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <defs>
    <radialGradient id="spotlight" cx="600" cy="400" r="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D5A27" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="yellow-metal" x1="400" y1="400" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD700"/>
      <stop offset="0.5" stop-color="#FFB900"/>
      <stop offset="1" stop-color="#E6A800"/>
    </linearGradient>
  </defs>
  <circle cx="600" cy="400" r="400" fill="url(#spotlight)"/>
  
  <!-- Digger Silhouette with Lighting -->
  <g transform="translate(300, 300) scale(1.5)">
    <!-- Tracks -->
    <rect x="20" y="160" width="200" height="40" rx="10" fill="#1A1A1A"/>
    <rect x="40" y="150" width="160" height="60" rx="10" fill="#111111"/>
    
    <!-- Body -->
    <path d="M50 150 L50 80 L180 80 L180 150 Z" fill="url(#yellow-metal)"/>
    <rect x="60" y="90" width="40" height="30" fill="#0A0A0A" opacity="0.8"/> <!-- Cab -->
    
    <!-- Boom -->
    <path d="M160 100 L250 40 L270 50 L180 110 Z" fill="url(#yellow-metal)"/>
    <path d="M250 40 L320 120 L310 130 L240 50 Z" fill="url(#yellow-metal)"/>
    
    <!-- Bucket -->
    <path d="M320 120 L350 150 L330 160 L300 130 Z" fill="#1A1A1A"/>
    
    <!-- Highlights -->
    <path d="M50 80 L180 80" stroke="white" stroke-width="1" opacity="0.3"/>
    <path d="M160 100 L250 40" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>
  
  <text x="600" y="700" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="24" letter-spacing="4" opacity="0.5">HEAVY EQUIPMENT PROTECTION</text>
</svg>
